<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Saran Construction App</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <img src="logo.png" class="logo" alt="Saran Construction" />
      <div class="tagline">AGENDA • CHANTIERS • PUNCH • DÉPENSES</div>
    </header>

    <nav class="tabs">
      <button data-tab="today" class="active">🏠 Aujourd'hui</button>
      <button data-tab="calendar">📅 Calendrier</button>
      <button data-tab="jobs">🛠 Chantiers</button>
      <button data-tab="punch">⏱ Punch</button>
      <button data-tab="expenses">💵 Dépenses</button>
    </nav>

    <main>
      <section id="today" class="page active">
        <div class="card hero"><div><small>AUJOURD'HUI</small><h1>Tableau de bord</h1></div><button onclick="openQuickTask()">+ TÂCHE</button></div>
        <div id="todayList" class="list"></div>
      </section>

      <section id="calendar" class="page">
        <div class="card"><h2>Ajouter au calendrier</h2>
          <input id="taskTitle" placeholder="Tâche / job" />
          <input id="taskDate" type="date" />
          <select id="taskJob"></select>
          <input id="taskEmployee" placeholder="Assigné à (Jesse, Karl...)" />
          <textarea id="taskNote" placeholder="Notes"></textarea>
          <button onclick="addTask()">Ajouter</button>
        </div>
        <div id="calendarList" class="list"></div>
      </section>

      <section id="jobs" class="page">
        <div class="card"><h2>Nouveau chantier</h2>
          <input id="jobName" placeholder="Client / chantier" />
          <input id="jobAddress" placeholder="Adresse" />
          <input id="jobPhone" placeholder="Téléphone" />
          <textarea id="jobNote" placeholder="Notes du chantier"></textarea>
          <button onclick="addJob()">Créer chantier</button>
        </div>
        <div id="jobsList" class="list"></div>
      </section>

      <section id="punch" class="page">
        <div class="card"><h2>Punch</h2>
          <select id="punchJob"></select>
          <input id="punchEmployee" placeholder="Employé" value="Jesse" />
          <div class="row"><button onclick="punchIn()">Punch IN</button><button onclick="punchOut()">Punch OUT</button></div>
        </div>
        <div id="punchList" class="list"></div>
      </section>

      <section id="expenses" class="page">
        <div class="card"><h2>Dépense / facture</h2>
          <select id="expenseJob"></select>
          <input id="expenseSupplier" placeholder="Fournisseur (SJC, Canac...)" />
          <input id="expenseAmount" type="number" step="0.01" placeholder="Montant" />
          <select id="expenseCategory"><option>Matériaux</option><option>Essence</option><option>Location</option><option>Sous-traitant</option><option>Autre</option></select>
          <input id="expensePhoto" type="file" accept="image/*" capture="environment" />
          <textarea id="expenseNote" placeholder="Note"></textarea>
          <button onclick="addExpense()">Sauvegarder facture</button>
        </div>
        <div id="expenseList" class="list"></div>
      </section>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
